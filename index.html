<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#101b34" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>교통약자 이동지도</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
  <!-- 상단 검색바 -->
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="장소를 검색하세요" />
    <button id="search-btn" aria-label="검색">🔍</button>
  </div>
  <!-- 검색 결과 드롭다운 -->
  <ul id="search-results"></ul>
  <!-- 지도 영역 -->
  <div id="map"></div>
  <!-- 내 위치로 이동 버튼 -->
  <button id="locate-btn" aria-label="내 위치로 이동">📍</button>
  <!-- 장애물 제보 UI -->
  <div id="report-panel">
    <select id="report-category-select" aria-label="장애물 종류 선택">
      <option value="curb">턱</option>
      <option value="stairs">계단</option>
      <option value="other">기타</option>
    </select>
    <button id="report-btn" aria-label="장애물 제보">📷 제보</button>
    <input type="file" id="report-photo-input" accept="image/*" capture="environment" style="display:none" />
  </div>
  <!-- 제보 모달: 사진 선택 후 미리보기 + 설명 입력 (신규) -->
  <div id="report-modal">
    <div class="report-modal-inner">
      <img id="report-preview" src="" alt="제보 사진 미리보기" />
      <textarea id="report-desc-input" placeholder="이 장소가 왜 불편한지 간단히 설명해주세요 (예: 인도 턱이 높아 휠체어 통행이 어려움)"></textarea>
      <div class="report-modal-actions">
        <button id="report-cancel-btn">취소</button>
        <button id="report-submit-btn">제보 등록</button>
      </div>
    </div>
  </div>
  <!-- 하단 상태바 -->
  <div id="status-bar">위치 정보를 가져오는 중...</div>
  <!--
    ⚠️ 아래 APP KEY는 반드시 본인의 카카오 앱 키(JavaScript 키)로 교체하세요.
    발급: https://developers.kakao.com → 내 애플리케이션 → 앱 키 → JavaScript 키
    [플랫폼] 설정에서 사용할 도메인(예: https://아이디.github.io)을 반드시 등록해야
    실제 배포 후에도 정상 동작합니다. (등록 안 하면 콘솔에 도메인 에러 발생)
    [카카오맵] 사용 설정을 ON으로 해야 지도가 로드됩니다.
  -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=26a7a2b9329b0191fadc30b42453aa87&libraries=services&autoload=false"></script>
  <script src="script.js"></script>
</body>
</html>
